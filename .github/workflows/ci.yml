name: Client CI

on:
      push:
            branches: [main, master, develop]
      pull_request:
            branches: [main, master, develop]

jobs:
      client-ci:
            name: Client CI
            runs-on: ubuntu-latest

            steps:
                  - uses: actions/checkout@v4

                  - name: Setup Node.js
                    uses: actions/setup-node@v4
                    with:
                          node-version: '20'
                          cache: 'npm'

                  - name: Install dependencies
                    run: npm ci

                  - name: Linting
                    run: npm run lint

                  - name: Type Check & Build
                    run: npm run build
